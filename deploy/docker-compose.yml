# ============================================================
# 物联网平台 - 一键部署(Docker Compose 单机版)
# 包含: MySQL 8 / TDengine 3 / EMQX 5 / Backend / Frontend
# ============================================================
#
# 启动:
#   cd deploy
#   docker compose up -d
#
# 关闭(保留数据):
#   docker compose down
#
# 彻底清理(连数据一起删):
#   docker compose down -v
#
# 查看日志:
#   docker compose logs -f backend
# ============================================================

name: iot-platform

services:
  # ---------- MySQL 8: 业务数据 ----------
  mysql:
    image: mysql:8.0
    container_name: iot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE:      ${MYSQL_DB:-iot_platform}
      MYSQL_USER:          ${MYSQL_USER:-iot}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-iot123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_connections=500
    ports:
      - "${MYSQL_PORT:-33402}:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot-net

  # ---------- TDengine 3: 时序数据 ----------
  tdengine:
    image: tdengine/tdengine:3.0.5.0
    container_name: iot-tdengine
    restart: unless-stopped
    hostname: tdengine
    environment:
      TAOS_FQDN: tdengine
      TZ: Asia/Shanghai
    ports:
      - "${TDENGINE_PORT:-33403}:6041"   # RESTful
      - "${TDENGINE_NATIVE_PORT:-33404}:6030"   # 原生协议
    volumes:
      - ./tdengine/taos.cfg:/etc/taos/taos.cfg:ro
      - ./tdengine/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - tdengine_data:/var/lib/taos
    healthcheck:
      test: ["CMD", "taos", "-h", "127.0.0.1", "-s", "show databases;"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot-net

  # ---------- EMQX 5: MQTT Broker ----------
  emqx:
    image: emqx/emqx:5.6.1
    container_name: iot-emqx
    restart: unless-stopped
    environment:
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
      EMQX_MQTT__MAX_PACKET_SIZE: 10MB
      EMQX_LISTENER__TCP__MQTT__MAX_CONNECTIONS: 1000000
      TZ: Asia/Shanghai
    ports:
      - "${EMQX_MQTT_PORT:-33405}:1883"   # MQTT
      - "${EMQX_MQTTS_PORT:-33406}:8883"  # MQTT/SSL
      - "${EMQX_WS_PORT:-33407}:8083"     # MQTT/WebSocket
      - "${EMQX_WSS_PORT:-33408}:8084"    # MQTT/WebSocket/SSL
      - "${EMQX_DASHBOARD_PORT:-33409}:18083"  # Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - iot-net

  # ---------- Backend: Spring Boot 3 ----------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: iot-platform/backend:1.0.0
    container_name: iot-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      tdengine:
        condition: service_healthy
      emqx:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306   # 容器内仍用 3306,通过 Docker 网络访问
      MYSQL_DB: ${MYSQL_DB:-iot_platform}
      MYSQL_USER: ${MYSQL_USER:-iot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-iot123456}
      TDENGINE_HOST: tdengine
      TDENGINE_PORT: 6041   # 容器内仍用 6041
      TDENGINE_USER: root
      TDENGINE_PASSWORD: taosdata
      MQTT_BROKER: tcp://emqx:1883   # 容器内仍用 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-emqx_user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-emqx_pass}
      JWT_SECRET: ${JWT_SECRET:-iot-platform-super-secret-key-must-be-at-least-32-bytes-long-for-hs256}
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "${BACKEND_PORT:-33412}:9000"
    volumes:
      - backend_logs:/app/logs
      - backend_upload:/app/uploadPath
    networks:
      - iot-net

  # ---------- Frontend: Vue 3 + Nginx ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: iot-platform/frontend:1.0.0
    container_name: iot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-33411}:80"
    networks:
      - iot-net

volumes:
  mysql_data:
  tdengine_data:
  emqx_data:
  emqx_log:
  backend_logs:
  backend_upload:

networks:
  iot-net:
    driver: bridge
