# TDengine 客户端/服务端配置
# 详细配置见 https://docs.taosdata.com/reference/config/

# FQDN
fqdn                    localhost
serverPort              6030

# 监控
monitor                 1
monitorInterval         30

# 性能(单机部署推荐)
minimalDataDirGB        0.1
minimalLogDirGB         0.1

# 时区
timezone                Asia/Shanghai
locale                 C

# 字符集
charset                UTF-8

# 异步写入(平衡性能与可靠性)
asyncLog                0
numOfMnodes             1

# 缓存
cache                   16
blocks                  8
maxShellConns           10000
