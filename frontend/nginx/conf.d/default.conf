# ============================================================
# Frontend Nginx 配置
# 1. SPA 路由 fallback
# 2. /api 反向代理到后端 backend:9000
#    容器内仍用 9000(同一 Docker 网络),主机端口已映射为 33401
# 3. 静态资源缓存
# 4. 移动端友好的 gzip
# 5. 安全响应头(CSP / X-Frame-Options / 等)
#    CSP 来源注释:
#      'self'                 - 项目自身资源
#      'unsafe-inline'        - Vue/Vite 模板需要 inline style + index.html 的 FOUC 脚本
#      webapi.amap.com        - 高德地图 JS API + Web 服务
#      *.amap.com             - 高德地图瓦片/标注/数据
#      ws: / wss:             - WebSocket 实时数据
#      data: / blob:          - 内嵌图片(国标 SVG / 缩略图)
# ============================================================

server {
    listen       80;
    server_name  localhost;

    # 字符集
    charset utf-8;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # 根目录
    root   /usr/share/nginx/html;
    index  index.html;

    # ============================================================
    # 安全响应头(全部统一加,作用于整个 server)
    # ============================================================
    # 禁止 MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # 同源才允许 iframe 嵌入(用 SAMEORIGIN 而非 DENY,因为内部有 iframe 嵌拓扑图)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Referrer 只在同源 / 跨域 HTTPS→HTTPS 时发送
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 禁用摄像头/麦克风,geolocation 仅同源 + 高德地图
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self \"https://*.amap.com\")" always;
    # CSP(主防线):严格限制资源加载来源
    # 警告:若后端新增域名白名单,记得同步更新此 header
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://webapi.amap.com; style-src 'self' 'unsafe-inline' https://*.amap.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: https://webapi.amap.com https://*.amap.com; frame-src 'self' https://*.amap.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass         http://backend:9000/api/;   # 容器内端口
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size 50m;
    }

    # WebSocket 代理(实时数据/告警推送)
    location /api/ws/ {
        proxy_pass         http://backend:9000/api/ws/;   # 容器内端口
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400s;  # 长连接
    }

    # 错误页
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
