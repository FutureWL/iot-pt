server:
  port: 9000
  servlet:
    context-path: /api
  # 注: 容器内 9000 端口映射到主机 ${BACKEND_PORT:-33401}
  # 本地开发时启动在 9000,运行时可通过 BACKEND_PORT 环境变量调整容器映射
  tomcat:
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: iot-platform
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # 业务库: MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 注: 自定义 DataSourceConfig 用 HikariDataSource + @ConfigurationProperties,
    #     Hikari 绑定的字段名是 jdbc-url,这里必须用 jdbc-url 而不是 url
    jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:iot_platform}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # 注: 容器内 MySQL 仍用默认 3306(同一 Docker 网络),主机端口已映射为 ${MYSQL_PORT:-33402}
    # 本地开发: MYSQL_PORT=33402
    username: ${MYSQL_USER:iot}
    password: ${MYSQL_PASSWORD:iot123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  # 时序库: TDengine
  taos:
    # 注: 同上,Hikari 绑定的是 jdbc-url
    jdbc-url: jdbc:TAOS-RS://${TDENGINE_HOST:localhost}:${TDENGINE_PORT:6041}/iot_data
    # 注: 容器内 TDengine RESTful 仍用 6041(同一 Docker 网络),主机端口已映射为 ${TDENGINE_PORT:-33403}
    # 本地开发: TDENGINE_PORT=33403
    username: ${TDENGINE_USER:root}
    password: ${TDENGINE_PASSWORD:taosdata}
    driver-class-name: com.taosdata.jdbc.rs.RestfulDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # 缓存: Redis (Lettuce)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.iot.platform.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 多租户(关闭内置,用我们自己的拦截器)
mybatis-plus-tenant:
  enabled: false

# Knife4j / Swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn

# Actuator 可观测性(K8s 探针 / 监控系统接入 / Prometheus 抓取)
# 暴露 health/info/metrics/prometheus
#   - health: K8s liveness/readiness 探针
#   - prometheus: /actuator/prometheus 供 Prometheus 抓取
#   - metrics: Micrometer 指标(JSON 格式)
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 开发环境显示详情,生产环境走 when-authorized(详见 prod profile)
      show-details: when-authorized
      probes:
        enabled: true  # K8s liveness/readiness 探针
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
        # 同一进程多实例时,加 instance label 区分(避免 prometheus 拼接)
        step: 60s

# JWT 配置
iot:
  # 慢 SQL 阈值(超过则写到独立 logger)
  sql:
    slow-threshold-ms: 500
  # role: all(单进程,默认) | api(独立 API 进程) | iot(独立 IoT 进程)
  role: ${IOT_ROLE:all}
  # 是否启用协议层(MQTT/TCP 适配器): 独立 API 进程设为 false
  protocol-layer-enabled: ${IOT_PROTOCOL_LAYER_ENABLED:true}
  # IoT 控制台(独立 IoT 进程时启用,单进程模式也可打开)
  console:
    enabled: ${IOT_CONSOLE_ENABLED:true}
    spy-enabled: ${IOT_CONSOLE_SPY_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:iot-platform-super-secret-key-must-be-at-least-32-bytes-long-for-hs256}
    expire: 86400          # 24 小时(秒)
    refresh: 604800        # 7 天
    header: Authorization
    prefix: "Bearer "
  tenant:
    enable: true
    super-tenant-id: 1     # 超级租户
  protocol:
    mqtt:
      enabled: true
      broker-url: ${MQTT_BROKER:tcp://emqx:1883}
      # 注: 容器内 MQTT 仍用 1883(同一 Docker 网络),主机端口已映射为 ${EMQX_MQTT_PORT:-33405}
      # 本地开发: tcp://localhost:33405
      client-id: iot-platform-server
      username: ${MQTT_USERNAME:emqx_user}
      password: ${MQTT_PASSWORD:emqx_pass}
      subscribe-qos: 1
    tcp:
      enabled: true
      port: ${TCP_PORT:33410}
      boss-threads: 1
      worker-threads: 4
  rule:
    enabled: true
    thread-pool-size: 4
    queue-capacity: 1000
  device:
    # 设备超时离线扫描(MQTT 没有 last-will 时,靠这个)
    offline-monitor-enabled: true
    offline-monitor-interval-seconds: 30
    # 多久没收到上报视为离线(秒)
    offline-timeout-seconds: 90


# 日志
logging:
  level:
    root: INFO
    com.iot.platform: DEBUG
    org.springframework.security: WARN
    org.eclipse.paho: WARN
    io.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: prod
# 生产环境关闭 actuator 详细信息,只暴露状态 UP/DOWN
management:
  endpoint:
    health:
      show-details: never
      show-components: never
logging:
  level:
    root: WARN
    com.iot.platform: INFO
