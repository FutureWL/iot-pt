# GitHub Actions PR check workflow
# 触发: pull_request + push to main
# 检查: 前端 type-check / lint / test + 后端 mvn test

name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同 PR 多个并发 push 取消前一个,避免浪费 CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 前端 (Vue 3 + Vite + TypeScript)
  # ============================================================
  frontend:
    name: Frontend (type-check + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint
        # baseline 有 84 errors + 42 warnings,见 docs/inspections/2026-06-28-lint-setup.md
        # 后续 sprint 修完后改为 fail-on-warn
        run: npm run lint || true

      - name: Unit tests
        run: npm run test:run

      # e2e 在 PR check 中跳过(慢、需要后端在跑)
      # nightly job 单独跑 playwright

  # ============================================================
  # 后端 (Spring Boot 3 + Java 17 + Maven)
  # ============================================================
  backend:
    name: Backend (mvn test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        # -am (also-make) 自动构建依赖模块 (iot-common)
        run: mvn test -pl iot-api -am -B
        # 失败时打印更多上下文
      - name: Publish test report on failure
        if: failure()
        run: |
          echo "=== Surefire reports ==="
          find backend -path '*/surefire-reports/*.txt' -exec echo '--- {} ---' \; -exec cat {} \;

  # ============================================================
  # 合并门禁: 任意一个 job 失败则 PR 不可合并
  # ============================================================
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: success()
    steps:
      - name: Success
        run: echo "✅ Frontend + Backend all green"