# GitHub Actions PR check workflow
# 触发: pull_request + push to main
# 检查: 前端 type-check / lint / lint:css / build:check / test + 后端 mvn verify + JaCoCo

name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同 PR 多个并发 push 取消前一个,避免浪费 CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 前端 (Vue 3 + Vite + TypeScript)
  # ============================================================
  frontend:
    name: Frontend (type-check + lint + lint:css + build:check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint CSS (stylelint)
        run: npm run lint:css

      - name: Unit tests
        run: npm run test:run

      - name: Build check
        # 验证 vite build 能跑通(打包阶段常见错误)
        run: npm run build:check

      # e2e 在 PR check 中跳过(慢、需要后端在跑)
      # nightly job 单独跑 playwright (见 .github/workflows/nightly.yml)

  # ============================================================
  # 后端 (Spring Boot 3 + Java 17 + Maven)
  # ============================================================
  backend:
    name: Backend (mvn verify + JaCoCo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests + JaCoCo coverage check
        # verify 阶段会触发 surefire(单测) + failsafe(IT) + jacoco(check)
        # -am (also-make) 自动构建依赖模块 (iot-common)
        run: mvn -pl iot-api -am verify -B

      - name: Publish test report on failure
        if: failure()
        run: |
          echo "=== Surefire reports ==="
          find backend -path '*/surefire-reports/*.txt' -exec echo '--- {} ---' \; -exec cat {} \;

      - name: Upload JaCoCo coverage report
        if: always() && hashFiles('backend/iot-api/target/site/jacoco/index.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/iot-api/target/site/jacoco/
          retention-days: 14

  # ============================================================
  # 合并门禁: 任意一个 job 失败则 PR 不可合并
  # ============================================================
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: success()
    steps:
      - name: Success
        run: echo "✅ Frontend + Backend all green"
